<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>登录</title>
    <style>
        body { text-align: center; margin-top: 100px; }
        input { margin: 10px; padding: 8px; width: 200px; }
        button { padding: 8px 20px; background: #007bff; color: white; border: none; }
    </style>
</head>
<body>
    <h2>博客登录</h2>
    <input type="text" id="username" placeholder="用户名"><br>
    <input type="password" id="password" placeholder="密码"><br>
    <button onclick="login()">登录</button>

    <script>
        async function login() {
            // 获取输入框内容
            let username = document.getElementById('username').value;
            let password = document.getElementById('password').value;

            // 发送请求到后端登录接口
            let res = await fetch('http://localhost:8080/user/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, password })
            });

            let data = await res.json();

            // 判断登录结果
            if (data.data === true) {
                alert('登录成功');
                location.href = 'list.html'; // 成功才跳转
            } else {
                alert('用户名或密码错误');
            }
        }
    </script>
</body>
</html>
