<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>发布文章</title>
    <style>
        body { padding: 20px; }
        input, textarea { width: 300px; margin: 10px; padding: 8px; }
        button { padding: 8px 20px; background: #28a745; color: white; border: none; }
    </style>
</head>
<body>
    <h2>发布新文章</h2>
    <input type="text" id="title" placeholder="文章标题"><br>
    <textarea id="content" placeholder="文章内容"></textarea><br>
    <button onclick="addArticle()">发布</button>

    <script>
        async function addArticle() {
            let title = document.getElementById('title').value;
            let content = document.getElementById('content').value;

            let res = await fetch('http://localhost:8080/article/add', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ title, content, categoryId: null })
            });

            let data = await res.json();

            if (data.data === true) {
                alert('发布成功');
                location.href = 'list.html'; // 发布成功跳回列表
            } else {
                alert('发布失败');
            }
        }
    </script>
</body>
</html>
